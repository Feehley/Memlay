<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Map</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --raised:  #1c2128;
    --border:  #30363d;
    --text:    #cdd9e5;
    --muted:   #768390;
    --accent:  #539bf5;
    --gap-bg:  #161b22;
    --err:     #e5534b;
  }

body.light {
–bg:      #f6f8fa;
–surface: #ffffff;
–raised:  #eaeef2;
–border:  #d0d7de;
–text:    #1f2328;
–muted:   #656d76;
–accent:  #0969da;
–gap-bg:  #eaeef2;
–err:     #cf222e;
}

/* theme toggle button */
.theme-toggle {
background: none;
border: 1px solid var(–border);
color: var(–muted);
font-size: 13px;
line-height: 1;
padding: 2px 7px;
border-radius: 4px;
cursor: pointer;
transition: border-color .12s, color .12s;
font-family: inherit;
}
.theme-toggle:hover { border-color: var(–accent); color: var(–accent); }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Cascadia Code’,‘Fira Code’,‘JetBrains Mono’,‘Consolas’,ui-monospace,monospace;
font-size: 12px;
height: 100vh;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* ── Header ─────────────────────────────── */
.header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 7px 14px;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
background: var(–surface);
}
.header-title { font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(–muted); }
.header-stats  { font-size:10px; color:var(–muted); }
.header-stats span { color:var(–text); }

/* ── Main ───────────────────────────────── */
.main { display:flex; flex:1; min-height:0; }

/* ── Viz panel ──────────────────────────── */
.viz-panel {
width: 172px; flex-shrink:0;
border-right: 1px solid var(–border);
padding: 14px 6px 14px 10px;
display: flex; flex-direction:column; gap:8px; overflow:hidden;
}
.panel-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(–muted); text-align:center; }
.bar-wrapper { flex:1; display:flex; gap:6px; min-height:0; }
.addr-col    { width:52px; flex-shrink:0; position:relative; }
.addr-tick {
position:absolute; right:0;
font-size:9px; color:var(–muted);
transform:translateY(-50%); text-align:right; white-space:nowrap;
}
.addr-tick::after {
content:’’; position:absolute; right:-7px; top:50%;
width:5px; height:1px; background:var(–border);
}
.memory-bar {
flex:1; position:relative;
background:var(–gap-bg); border:1px solid var(–border);
border-radius:2px; overflow:hidden; cursor:default;
}
.segment {
position:absolute; left:0; right:0;
display:flex; align-items:center; justify-content:center;
overflow:hidden; transition:filter .12s;
border-bottom:1px solid rgba(0,0,0,.35);
}
.segment:hover { filter:brightness(1.25); }
.segment.clickable { cursor:pointer; }
.seg-label {
font-size:9px; font-weight:700;
white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
padding:0 3px; pointer-events:none;
letter-spacing:.04em; text-shadow:0 1px 3px rgba(0,0,0,.6);
}

/* ── Table panel ────────────────────────── */
.table-panel { flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
.table-toolbar { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }

.btn {
background:var(–raised); border:1px solid var(–border); color:var(–text);
padding:4px 11px; font-size:11px; font-family:inherit;
cursor:pointer; border-radius:4px; transition:border-color .12s, color .12s;
}
.btn:hover { border-color:var(–accent); color:var(–accent); }
.btn-screenshot { border-color:#57ab5a44; }
.btn-screenshot:hover { border-color:#57ab5a; color:#57ab5a; }
.btn.capturing { opacity:.5; pointer-events:none; }

table { width:100%; border-collapse:collapse; flex-shrink:0; }
thead th {
font-size:9px; font-weight:500; letter-spacing:.1em; text-transform:uppercase;
color:var(–muted); padding:3px 6px 6px;
border-bottom:1px solid var(–border); text-align:left;
}
tbody tr { transition:background .08s; }
tbody tr:hover { background:var(–raised); }
tbody td { padding:2px 3px; border-bottom:1px solid #1c2128; vertical-align:middle; }

/* Color picker */
.color-cell { width:28px; text-align:center; }
.color-pick {
-webkit-appearance:none; appearance:none;
width:20px; height:20px;
border:1px solid var(–border); border-radius:3px;
padding:0; cursor:pointer; background:none; vertical-align:middle;
transition:border-color .1s;
}
.color-pick:hover { border-color:var(–accent); }
.color-pick::-webkit-color-swatch-wrapper { padding:2px; }
.color-pick::-webkit-color-swatch { border:none; border-radius:1px; }

td input[type=“text”], td input:not([type]) {
background:transparent; border:1px solid transparent;
color:var(–text); font-family:inherit; font-size:12px;
padding:3px 5px; width:100%; border-radius:3px; outline:none;
transition:border-color .1s, background .1s;
}
td input[type=“text”]:hover, td input:not([type]):hover { border-color:var(–border); }
td input[type=“text”]:focus, td input:not([type]):focus { border-color:var(–accent); background:var(–raised); }
td input.invalid { border-color:var(–err) !important; }

.del-btn {
background:none; border:none; color:var(–muted);
cursor:pointer; font-size:15px; line-height:1;
padding:1px 6px; border-radius:3px; transition:color .1s, background .1s;
}
.del-btn:hover { color:var(–err); background:#271b1b; }

/* ── Tooltip ────────────────────────────── */
#tooltip {
position:fixed; background:var(–surface); border:1px solid var(–border);
border-radius:5px; padding:8px 11px; font-size:11px;
pointer-events:none; z-index:999; white-space:nowrap;
display:none; box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.tt-name { font-weight:700; margin-bottom:5px; }
.tt-row  { color:var(–muted); margin-top:2px; }
.tt-row b { color:var(–text); font-weight:400; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(–border); border-radius:3px; }
</style>

</head>
<body>

<div class="header">
  <span class="header-title">&#9632; Memory Map</span>
  <div style="display:flex;align-items:center;gap:10px"><span class="header-stats" id="headerStats"></span><button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode">&#9790;</button></div>
</div>

<div class="main">

  <div class="viz-panel">
    <div class="panel-label">Layout</div>
    <div class="bar-wrapper">
      <div class="addr-col" id="addrCol"></div>
      <div class="memory-bar" id="memBar"></div>
    </div>
  </div>

  <div class="table-panel">
    <div class="table-toolbar">
      <span class="panel-label">Regions</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-screenshot" id="screenshotBtn" onclick="takeScreenshot()">&#11015; Export PNG</button>
        <button class="btn" onclick="addRow()">+ Add Region</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th class="color-cell">Color</th>
          <th style="width:82px">Offset</th>
          <th style="width:74px">Size</th>
          <th>Name</th>
          <th>Reference</th>
          <th style="width:24px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<div id="tooltip"></div>

<script>
const PALETTE = [
  '#539bf5','#57ab5a','#daaa3f','#e5534b','#b083f0',
  '#39c5cf','#f69d50','#6cb6ff','#8ddb8c','#cc6b2c'
];

let rows = [
  { offset:'0x0000', size:'0x0400', name:'Vector Table', ref:'', color:'#539bf5' },
  { offset:'0x0400', size:'0x1000', name:'Bootloader',   ref:'', color:'#57ab5a' },
  { offset:'0x1400', size:'0x4000', name:'FIP0',         ref:'', color:'#daaa3f' },
  { offset:'0x5400', size:'0x4000', name:'FIP1',         ref:'', color:'#e5534b' },
  { offset:'0x9400', size:'0x2000', name:'Config',       ref:'', color:'#b083f0' },
];

function parseNum(s) {
  if (!s || !s.trim()) return NaN;
  s = s.trim();
  if (/^0[xX][0-9a-fA-F]+$/.test(s)) return parseInt(s, 16);
  if (/^[0-9]+[kK]$/.test(s))         return parseInt(s) * 1024;
  if (/^[0-9]+[mM]$/.test(s))         return parseInt(s) * 1048576;
  if (/^[0-9]+$/.test(s))             return parseInt(s, 10);
  return NaN;
}

function fmtHex(n) {
  if (isNaN(n)) return '???';
  const h = n.toString(16).toUpperCase();
  return '0x' + h.padStart(h.length <= 4 ? 4 : h.length % 2 === 0 ? h.length : h.length+1, '0');
}

function fmtSize(n) {
  if (n >= 1048576) return (n/1048576).toFixed(n%1048576===0?0:1) + ' MB';
  if (n >= 1024)    return (n/1024).toFixed(n%1024===0?0:1) + ' KB';
  return n + ' B';
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="color-cell">' +
        '<input type="color" class="color-pick" data-i="' + i + '" value="' + row.color + '" title="Pick color">' +
      '</td>' +
      '<td><input data-i="' + i + '" data-f="offset" value="' + row.offset + '" placeholder="0x0000"></td>' +
      '<td><input data-i="' + i + '" data-f="size"   value="' + row.size   + '" placeholder="0x400"></td>' +
      '<td><input data-i="' + i + '" data-f="name"   value="' + row.name   + '" placeholder="Region name"></td>' +
      '<td><input data-i="' + i + '" data-f="ref"    value="' + row.ref    + '" placeholder="https://..."></td>' +
      '<td><button class="del-btn" title="Delete" onclick="deleteRow(' + i + ')">x</button></td>';
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.color-pick').forEach(picker => {
    picker.addEventListener('input', e => {
      rows[+e.target.dataset.i].color = e.target.value;
      renderViz();
    });
  });

  tbody.querySelectorAll('input[data-f]').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i, f = e.target.dataset.f;
      rows[i][f] = e.target.value;
      validateInput(e.target, f);
      renderViz();
    });
  });

  validateAll();
}

function validateInput(inp, f) {
  if (f === 'offset' || f === 'size') {
    const v = parseNum(inp.value);
    inp.classList.toggle('invalid', isNaN(v) || (f === 'size' && v <= 0));
  }
}

function validateAll() {
  document.querySelectorAll('#tbody input[data-f]').forEach(inp => {
    validateInput(inp, inp.dataset.f);
  });
}

function renderViz() {
  const bar    = document.getElementById('memBar');
  const addrEl = document.getElementById('addrCol');
  const stats  = document.getElementById('headerStats');
  bar.innerHTML = ''; addrEl.innerHTML = '';

  const valid = rows
    .map(r => ({ offset:parseNum(r.offset), size:parseNum(r.size), name:r.name, ref:r.ref, color:r.color }))
    .filter(r => !isNaN(r.offset) && !isNaN(r.size) && r.size > 0);

  if (!valid.length) { stats.innerHTML = ''; return; }
  valid.sort((a,b) => a.offset - b.offset);

  const addrMin  = valid[0].offset;
  const addrMax  = Math.max(...valid.map(r => r.offset + r.size));
  const addrSpan = addrMax - addrMin;
  if (addrSpan <= 0) return;

  const totalUsed = valid.reduce((a,r) => a + r.size, 0);
  stats.innerHTML = '<span>' + valid.length + '</span> regions &middot; <span>' + fmtHex(addrMin) + '</span> &rarr; <span>' + fmtHex(addrMax) + '</span> &middot; <span>' + fmtSize(totalUsed) + '</span> used';

  valid.forEach(r => {
    const top    = ((r.offset - addrMin) / addrSpan) * 100;
    const height = (r.size   / addrSpan) * 100;
    const seg = document.createElement('div');
    seg.className = 'segment' + (r.ref && r.ref.startsWith('http') ? ' clickable' : '');
    seg.style.top        = top + '%';
    seg.style.height     = Math.max(height, 0.4) + '%';
    seg.style.background = r.color + '28';
    seg.style.borderTop  = '1px solid ' + r.color;
    if (height > 2.5) {
      const lbl = document.createElement('div');
      lbl.className = 'seg-label';
      lbl.textContent = r.name || '-';
      lbl.style.color = r.color;
      seg.appendChild(lbl);
    }
    seg.addEventListener('mouseenter', e => showTip(e, r));
    seg.addEventListener('mousemove',  moveTip);
    seg.addEventListener('mouseleave', hideTip);
    if (r.ref && r.ref.startsWith('http')) seg.addEventListener('click', () => window.open(r.ref, '_blank'));
    bar.appendChild(seg);
  });

  const tickAddrs = [...new Set([addrMin, ...valid.map(r => r.offset), addrMax])].sort((a,b)=>a-b);
  let lastPct = -99;
  tickAddrs.forEach(addr => {
    const pct = ((addr - addrMin) / addrSpan) * 100;
    if (pct - lastPct < 6 && addr !== addrMax) return;
    lastPct = pct;
    const tick = document.createElement('div');
    tick.className = 'addr-tick';
    tick.style.top = pct + '%';
    tick.textContent = fmtHex(addr);
    addrEl.appendChild(tick);
  });
}

function showTip(e, r) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML =
    '<div class="tt-name" style="color:' + r.color + '">' + (r.name || '(unnamed)') + '</div>' +
    '<div class="tt-row">Start &nbsp;<b>' + fmtHex(r.offset) + '</b></div>' +
    '<div class="tt-row">Size &nbsp;&nbsp;<b>' + fmtHex(r.size) + ' (' + fmtSize(r.size) + ')</b></div>' +
    '<div class="tt-row">End &nbsp;&nbsp;&nbsp;<b>' + fmtHex(r.offset + r.size) + '</b></div>' +
    (r.ref ? '<div class="tt-row" style="margin-top:5px;color:' + r.color + '">' + r.ref + '</div>' : '');
  tt.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 14, y = e.clientY - 10;
  tt.style.left = (x + tt.offsetWidth > window.innerWidth ? x - tt.offsetWidth - 20 : x) + 'px';
  tt.style.top  = y + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

function addRow() {
  rows.push({ offset:'', size:'', name:'', ref:'', color: PALETTE[rows.length % PALETTE.length] });
  renderTable();
  renderViz();
  document.querySelectorAll('#tbody tr:last-child input[data-f]')[0]?.focus();
}

function deleteRow(i) {
  rows.splice(i, 1);
  renderTable();
  renderViz();
}

async function takeScreenshot() {
  const btn = document.getElementById('screenshotBtn');
  btn.textContent = '...';
  btn.classList.add('capturing');
  if (!window.html2canvas) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const toHide = document.querySelectorAll('.del-btn, #screenshotBtn');
  toHide.forEach(el => el.style.visibility = 'hidden');
  try {
    const canvas = await html2canvas(document.querySelector('.main'), { backgroundColor:'#0d1117', scale:2, useCORS:true });
    const full = document.createElement('canvas');
    const hdr  = document.querySelector('.header');
    const hh   = hdr.offsetHeight;
    full.width  = canvas.width;
    full.height = canvas.height + hh * 2;
    const ctx = full.getContext('2d');
    ctx.fillStyle = '#161b22';
    ctx.fillRect(0, 0, full.width, hh * 2);
    const hCanvas = await html2canvas(hdr, { backgroundColor:'#161b22', scale:2, useCORS:true });
    ctx.drawImage(hCanvas, 0, 0);
    ctx.drawImage(canvas, 0, hh * 2);
    const link = document.createElement('a');
    link.download = 'memory-map-' + Date.now() + '.png';
    link.href = full.toDataURL('image/png');
    link.click();
  } finally {
    toHide.forEach(el => el.style.visibility = '');
    btn.textContent = 'Export PNG';
    btn.classList.remove('capturing');
  }
}


// -- Theme toggle -------------------------------------------------------
function toggleTheme() {
  const light = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = light ? '\u263C' : '\u263E';
  localStorage.setItem('memmap-theme', light ? 'light' : 'dark');
}

// restore saved preference
(function() {
  const saved = localStorage.getItem('memmap-theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    // btn not rendered yet; will be set on first load
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = '\u263C';
  }
})();

renderTable();
renderViz();
// set correct icon after DOM ready
document.getElementById("themeBtn").textContent = document.body.classList.contains("light") ? "\u263C" : "\u263E";
</script>

</body>
</html>
